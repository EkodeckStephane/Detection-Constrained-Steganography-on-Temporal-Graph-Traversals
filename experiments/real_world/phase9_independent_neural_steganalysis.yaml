  max_encoded_rank_fraction: 0.5
detectors:
  - temporal_graph_eve
  - sequence_transformer_eve
training:
  context_length: 8
  embedding_dim: 24
  hidden_dim: 48
  epochs: 2
  batch_size: 256
  learning_rate: 0.003
  seed: 20260626
seed: 20260626
