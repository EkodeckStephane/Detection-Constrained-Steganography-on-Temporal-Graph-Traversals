campaign: phase9_independent_neural_steganalysis
date: 2026-06-26
datasets:
  - tgbl-wiki
  - mooc
  - lastfm
  - geolife_cells
  - t_drive_cells
event_datasets:
  - id: geolife_cells
    processed_path: datasets/processed/geolife_cells/events.parquet
  - id: t_drive_cells
    processed_path: datasets/processed/t_drive_cells/events.parquet
max_rows_per_split: 8000
model:
  prior_strength: 8.0
  top_k: 32
codec:
  max_bits_per_transition: 1
  codec_backend: range
  max_local_total_variation: 0.35
  max_local_kl_bits: 0.60
  min_entropy_bits: 0.5
